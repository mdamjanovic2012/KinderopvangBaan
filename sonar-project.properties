# ─── Project identification ───────────────────────────────────────────────────
sonar.projectKey=kinderopvangbaan
sonar.projectName=KinderopvangBaan
sonar.projectVersion=1.0

# ─── Source directories ───────────────────────────────────────────────────────
# Django backend
sonar.sources=backend,web/src
sonar.tests=backend/tests,web/src/__tests__

# ─── Language settings ────────────────────────────────────────────────────────
sonar.python.version=3.12

# ─── Exclusions ───────────────────────────────────────────────────────────────
sonar.exclusions=\
  **/migrations/**,\
  **/venv/**,\
  **/__pycache__/**,\
  **/node_modules/**,\
  **/.next/**,\
  **/coverage/**,\
  **/staticfiles/**,\
  **/media/**

sonar.test.exclusions=\
  backend/tests/**,\
  web/src/__tests__/**

# ─── Coverage reports ─────────────────────────────────────────────────────────
# Django — pytest-cov generates coverage.xml (Cobertura format)
sonar.python.coverage.reportPaths=backend/coverage.xml

# Next.js — jest generates lcov.info
sonar.javascript.lcov.reportPaths=web/coverage/lcov.info

# ─── Encoding ─────────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

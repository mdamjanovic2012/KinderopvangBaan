name: Integration Tests (Newman)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  newman:
    name: Newman — Postman integration tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: kinderopvangbaan
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings
      SECRET_KEY: ci-integration-secret
      DEBUG: "True"
      DB_NAME: kinderopvangbaan
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: "5432"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install GDAL / PostGIS system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gdal-bin libgdal-dev libgeos-dev libproj-dev binutils

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Set up Node (for Newman)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Wait for PostGIS
        run: until pg_isready -h localhost -U postgres; do sleep 1; done

      - name: Run Django migrations
        working-directory: backend
        run: python manage.py migrate --noinput

      - name: Start Django server (background)
        working-directory: backend
        run: |
          python manage.py runserver 0.0.0.0:8000 &
          echo $! > /tmp/django.pid
          # Wait until server is ready
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/health/ && break || sleep 2
          done

      - name: Run Newman
        run: |
          newman run tests/postman/kinderopvangbaan.postman_collection.json \
            --environment tests/postman/environment.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export newman-report.html \
            --bail

      - name: Stop Django server
        if: always()
        run: kill $(cat /tmp/django.pid) 2>/dev/null || true

      - name: Upload Newman HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: newman-report.html

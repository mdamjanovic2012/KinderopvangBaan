name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Django unit tests ───────────────────────────────────────────────────────
  django-tests:
    name: Django — pytest + coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: kinderopvangbaan_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings
      SECRET_KEY: ci-secret-key-not-used-in-prod
      DEBUG: "True"
      DB_NAME: kinderopvangbaan_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: "5432"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-test.txt

      - name: Install GDAL / PostGIS system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gdal-bin libgdal-dev libgeos-dev libproj-dev binutils

      - name: Install Python dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt -r requirements-test.txt

      - name: Wait for PostGIS
        run: |
          until pg_isready -h localhost -U postgres; do sleep 1; done

      - name: Run pytest
        working-directory: backend
        run: |
          pytest --no-header -q

      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: django-coverage
          path: backend/coverage.xml

  # ─── Next.js unit tests ──────────────────────────────────────────────────────
  nextjs-tests:
    name: Next.js — Jest + coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Run Jest
        working-directory: web
        run: npm run test:ci

      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-coverage
          path: web/coverage/lcov.info

  # ─── CodeQL security analysis (GitHub native, free) ─────────────────────────
  codeql:
    name: CodeQL — security scan
    runs-on: ubuntu-latest
    needs: [django-tests, nextjs-tests]
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      matrix:
        language: [python, javascript]

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

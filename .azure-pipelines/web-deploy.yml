trigger:
  branches:
    include:
      - main
  paths:
    include:
      - web/**

pool:
  vmImage: ubuntu-latest

variables:
  NODE_VERSION: "20.x"
  AZURE_WEBAPP_NAME: "kinderopvangbaan-web"
  NEXT_PUBLIC_API_URL: "https://kinderopvangbaan-api.azurewebsites.net/api"

stages:
  - stage: Build
    displayName: Build Next.js
    jobs:
      - job: Build
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)
            displayName: Install Node.js

          - script: npm ci
            workingDirectory: web
            displayName: Install dependencies

          - script: npm run build
            workingDirectory: web
            displayName: Build Next.js (standalone)
            env:
              NEXT_PUBLIC_API_URL: $(NEXT_PUBLIC_API_URL)

          # Package standalone output correctly
          - script: |
              cp -r .next/static .next/standalone/.next/static
              cp -r public .next/standalone/public
            workingDirectory: web
            displayName: Copy static assets into standalone

          - task: ArchiveFiles@2
            inputs:
              rootFolderOrFile: web/.next/standalone
              includeRootFolder: false
              archiveType: zip
              archiveFile: $(Build.ArtifactStagingDirectory)/web.zip
            displayName: Zip standalone build

          - publish: $(Build.ArtifactStagingDirectory)/web.zip
            artifact: web-build
            displayName: Publish artifact

  - stage: Deploy
    displayName: Deploy to Azure
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: Deploy
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebApp@1
                  inputs:
                    azureSubscription: AzureServiceConnection
                    appType: webAppLinux
                    appName: $(AZURE_WEBAPP_NAME)
                    package: $(Pipeline.Workspace)/web-build/web.zip
                    startUpCommand: "node server.js"
                  displayName: Deploy to Azure App Service

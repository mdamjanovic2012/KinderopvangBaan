trigger:
  branches:
    include:
      - main
  paths:
    include:
      - web/**
      - tests/postman/**
      - .azure-pipelines/web-deploy.yml

pr:
  branches:
    include:
      - main
  paths:
    include:
      - web/**

pool:
  name: MacLocal

variables:
  NODE_VERSION: "20.x"
  AZURE_WEBAPP_NAME: "kinderopvangbaan-web"
  NEXT_PUBLIC_API_URL: "https://kinderopvangbaan-api.azurewebsites.net/api"
  ARTIFACT_NAME: "web-build"
  # Semantic version: set MAJOR and MINOR in pipeline UI, PATCH = build counter
  MAJOR: "1"
  MINOR: "0"
  VERSION: "$(MAJOR).$(MINOR).$(Build.BuildId)"

stages:
  # ─────────────────────────────────────────
  # STAGE 1: Security & Lint
  # ─────────────────────────────────────────
  - stage: SecurityAndLint
    displayName: "Security & Lint"
    jobs:
      - job: SecurityScan
        displayName: "Dependency audit + Lint"
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)
            displayName: Install Node.js

          - script: npm ci
            workingDirectory: web
            displayName: Install dependencies

          - script: |
              echo "##[section]Running npm audit..."
              npm audit --audit-level=high --json > $(Build.ArtifactStagingDirectory)/npm-audit.json || true
              # Fail pipeline if critical vulnerabilities found
              npm audit --audit-level=critical
            workingDirectory: web
            displayName: Security audit (npm audit)

          - script: npm run lint -- --format json --output-file $(Build.ArtifactStagingDirectory)/lint-results.json || npm run lint
            workingDirectory: web
            displayName: ESLint
            continueOnError: true

          - publish: $(Build.ArtifactStagingDirectory)/npm-audit.json
            artifact: security-report
            displayName: Publish security report

  # ─────────────────────────────────────────
  # STAGE 2: Unit Tests
  # ─────────────────────────────────────────
  - stage: UnitTests
    displayName: "Unit Tests"
    dependsOn: SecurityAndLint
    condition: succeeded()
    jobs:
      - job: Jest
        displayName: "Jest unit tests"
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)
            displayName: Install Node.js

          - script: npm ci
            workingDirectory: web
            displayName: Install dependencies

          - script: npm run test:ci
            workingDirectory: web
            displayName: Run Jest tests
            env:
              CI: true

          - task: PublishTestResults@2
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: web/coverage/junit.xml
              failTaskOnFailedTests: true
              testRunTitle: "Jest Unit Tests"
            displayName: Publish test results
            condition: always()

          - task: PublishCodeCoverageResults@2
            inputs:
              summaryFileLocation: web/coverage/lcov.info
              pathToSources: web/src
            displayName: Publish code coverage
            condition: always()

  # ─────────────────────────────────────────
  # STAGE 3: Build & Version
  # ─────────────────────────────────────────
  - stage: Build
    displayName: "Build"
    dependsOn: UnitTests
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: BuildNextJs
        displayName: "Next.js standalone build"
        steps:
          - checkout: self
            persistCredentials: true

          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)
            displayName: Install Node.js

          - script: npm ci
            workingDirectory: web
            displayName: Install dependencies

          - script: npm run build
            workingDirectory: web
            displayName: "Build Next.js (v$(VERSION))"
            env:
              NEXT_PUBLIC_API_URL: $(NEXT_PUBLIC_API_URL)
              NEXT_PUBLIC_APP_VERSION: $(VERSION)

          - script: |
              cp -r .next/static .next/standalone/.next/static
              cp -r public .next/standalone/public
              # Embed version file
              echo "$(VERSION)" > .next/standalone/VERSION
            workingDirectory: web
            displayName: Package standalone output

          - task: ArchiveFiles@2
            inputs:
              rootFolderOrFile: web/.next/standalone
              includeRootFolder: false
              archiveType: zip
              archiveFile: $(Build.ArtifactStagingDirectory)/web-$(VERSION).zip
            displayName: "Create artifact web-$(VERSION).zip"

          - publish: $(Build.ArtifactStagingDirectory)/web-$(VERSION).zip
            artifact: $(ARTIFACT_NAME)
            displayName: Publish build artifact

          - script: |
              git config user.email "devops@kinderopvangbaan.nl"
              git config user.name "Azure DevOps"
              git tag -a "v$(VERSION)" -m "Release v$(VERSION) [skip ci]"
              git -c http.extraHeader="Authorization: Bearer $(System.AccessToken)" push origin "v$(VERSION)"
            displayName: "Tag release v$(VERSION)"
            condition: succeeded()
            env:
              SYSTEM_ACCESSTOKEN: $(System.AccessToken)

  # ─────────────────────────────────────────
  # STAGE 4: API Integration Tests (Newman)
  # ─────────────────────────────────────────
  - stage: IntegrationTests
    displayName: "API Integration Tests (Newman)"
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: Newman
        displayName: "Postman / Newman"
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)
            displayName: Install Node.js

          - script: npm install -g newman newman-reporter-junitfull
            displayName: Install Newman

          - script: |
              newman run tests/postman/kinderopvangbaan.postman_collection.json \
                --environment tests/postman/environment.json \
                --env-var "BASE_URL=$(NEXT_PUBLIC_API_URL)" \
                --reporters cli,junitfull \
                --reporter-junitfull-export $(Build.ArtifactStagingDirectory)/newman-results.xml \
                --bail
            displayName: Run Newman API tests

          - task: PublishTestResults@2
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: $(Build.ArtifactStagingDirectory)/newman-results.xml
              failTaskOnFailedTests: true
              testRunTitle: "Newman API Tests"
            displayName: Publish Newman results
            condition: always()

  # ─────────────────────────────────────────
  # STAGE 5: Deploy to Production
  # ─────────────────────────────────────────
  - stage: Deploy
    displayName: "Deploy to Production"
    dependsOn: IntegrationTests
    condition: succeeded()
    jobs:
      - deployment: DeployWeb
        displayName: "Deploy to Azure App Service"
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: $(ARTIFACT_NAME)
                  displayName: Download artifact

                - task: AzureWebApp@1
                  inputs:
                    azureSubscription: AzureServiceConnection
                    appType: webAppLinux
                    appName: $(AZURE_WEBAPP_NAME)
                    package: $(Pipeline.Workspace)/$(ARTIFACT_NAME)/web-$(VERSION).zip
                    startUpCommand: "node server.js"
                  displayName: "Deploy v$(VERSION) to Azure"

                - script: |
                    echo "Verifying deployment..."
                    sleep 15
                    STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://$(AZURE_WEBAPP_NAME).azurewebsites.net)
                    echo "HTTP status: $STATUS"
                    [ "$STATUS" = "200" ] || [ "$STATUS" = "307" ] || [ "$STATUS" = "308" ] && echo "Deployment OK" || exit 1
                  displayName: Smoke test

################################################################################
# Pipeline: Diploma Update (handmatig)
#
# Gebruik:
#   - Draai handmatig via Azure DevOps UI → "Run pipeline"
#   - force=true  → altijd importeren, ook als < 180 dagen geleden
#   - force=false → zelfde skip-logica als de deploy pipeline
#
# Verbinding: SSH-tunnel naar app container via az webapp create-remote-connection
# (wachtwoord: Docker!) — NIET Kudu SCM (Python niet beschikbaar in Kudu).
################################################################################

trigger: none   # nooit automatisch — alleen handmatig starten

parameters:
  - name: force
    displayName: "Forceer update (ook als < 180 dagen geleden)"
    type: boolean
    default: false

pool:
  name: MacLocal

variables:
  AZURE_WEBAPP_NAME: "kinderopvangbaan-api"

jobs:
  - job: UpdateDiplomas
    displayName: "Diploma update op productie"
    timeoutInMinutes: 30

    steps:
      - script: |
          which sshpass || brew install hudochenkov/sshpass/sshpass
        displayName: "Zorg dat sshpass beschikbaar is"

      - task: AzureCLI@2
        displayName: "Diploma update via SSH${{ if parameters.force }} (--force)${{ else }} (skip als < 180d)${{ endif }}"
        inputs:
          azureSubscription: AzureServiceConnection
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            # ── Open SSH-tunnel naar app container (niet Kudu SCM) ──────────────
            az webapp create-remote-connection \
              --name $(AZURE_WEBAPP_NAME) \
              --resource-group kinderopvangbaan-rg \
              --port 2222 &
            TUNNEL_PID=$!
            echo "SSH-tunnel gestart (PID $TUNNEL_PID), wacht 12s..."
            sleep 12

            ssh_run() {
              sshpass -p "Docker!" ssh \
                -o StrictHostKeyChecking=no \
                -o UserKnownHostsFile=/dev/null \
                -p 2222 root@127.0.0.1 "$1"
            }

            # GDAL/GEOS setup — wordt op de remote uitgevoerd
            GDAL_SETUP='GDAL_SO=$(find /usr/lib -name "libgdal.so*" 2>/dev/null | head -1); GEOS_SO=$(find /usr/lib -name "libgeos_c.so*" 2>/dev/null | head -1); [ -n "$GDAL_SO" ] && export GDAL_LIBRARY_PATH="$GDAL_SO"; [ -n "$GEOS_SO" ] && export GEOS_LIBRARY_PATH="$GEOS_SO"'

            # ── Stap 1: Status vóór update ──────────────────────────────────────
            echo "=== STATUS VOOR UPDATE ==="
            ssh_run "cd /home/site/wwwroot; $GDAL_SETUP; python manage.py update_diplomas --status" || true

            # ── Stap 2: Draai diploma update ────────────────────────────────────
            echo "=== DIPLOMA UPDATE ==="
            ${{ if parameters.force }}
            ssh_run "cd /home/site/wwwroot; $GDAL_SETUP; python manage.py update_diplomas --force"
            ${{ else }}
            ssh_run "cd /home/site/wwwroot; $GDAL_SETUP; python manage.py update_diplomas"
            ${{ endif }}
            UPDATE_EXIT=$?

            # ── Stap 3: Verifieer na update ─────────────────────────────────────
            echo "=== STATUS NA UPDATE ==="
            ssh_run "cd /home/site/wwwroot; $GDAL_SETUP; python manage.py update_diplomas --status" || true
            ssh_run "cd /home/site/wwwroot; $GDAL_SETUP; python manage.py shell -c 'from diplomacheck.models import Diploma; c=Diploma.objects.count(); print(\"Diploma count:\", c)'" || true

            # ── Sluit tunnel ────────────────────────────────────────────────────
            kill $TUNNEL_PID 2>/dev/null || true
            exit $UPDATE_EXIT

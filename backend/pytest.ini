[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = tests/test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --reuse-db
    --cov=institutions
    --cov=jobs
    --cov=users
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    --cov-fail-under=90
    --cov-config=.coveragerc
